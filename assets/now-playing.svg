<svg xmlns="http://www.w3.org/2000/svg" width="600" height="150" viewBox="0 0 600 150" fill="none">
  <!-- Styles for font and animation -->
  <style>
    .track-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      fill: #111111;
    }
    .track-artist {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 400;
      fill: #555555;
    }
    .jammed-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      fill: #858585;
      text-anchor: middle;
    }
  </style>

  <!-- "last jammed out to" label -->
  <text x="300" y="30" class="jammed-text">last jammed out to</text>

  <!-- Left Equalizer Bars (animated) -->
  <g>
    <rect x="70" y="70" width="100" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="100;40;80;60;100" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="x" values="70;130;90;110;70" dur="1.8s" repeatCount="indefinite" />
    </rect>
    <rect x="90" y="85" width="80" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="80;110;60;90;80" dur="1.3s" repeatCount="indefinite" />
      <animate attributeName="x" values="90;60;110;80;90" dur="1.3s" repeatCount="indefinite" />
    </rect>
    <rect x="110" y="100" width="60" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="60;90;40;80;60" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="x" values="110;80;130;90;110" dur="1.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Right Equalizer Bars (animated) -->
  <g>
    <rect x="430" y="70" width="100" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="100;60;80;40;100" dur="1.6s" repeatCount="indefinite" />
    </rect>
    <rect x="430" y="85" width="80" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="80;110;50;90;80" dur="1.4s" repeatCount="indefinite" />
    </rect>
    <rect x="430" y="100" width="60" height="6" rx="3" fill="#a1b64a">
      <animate attributeName="width" values="60;40;80;50;60" dur="1.7s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Center Card -->
  <rect x="180" y="50" width="240" height="74" rx="8" fill="#d2d2d2" stroke="#b0b0b0" stroke-width="1.5"/>

  <!-- Album Art Image -->
  <clipPath id="album-clip">
    <rect x="188" y="58" width="58" height="58" rx="4" />
  </clipPath>
  <image x="188" y="58" width="58" height="58" href="https://en.wikipedia.org/wiki/Special:FilePath/Malcolm_Todd_-_Sweet_Boy.jpg" clip-path="url(#album-clip)" />

  <!-- Track Details -->
  <!-- Track Title -->
  <text x="256" y="76" class="track-title">Earrings</text>
  <!-- Track Artist -->
  <text x="256" y="93" class="track-artist">Malcolm Todd</text>

  <!-- Seek/Progress Bar -->
  <rect x="256" y="104" width="150" height="3" rx="1.5" fill="#a0a0a0" />
  <rect x="256" y="104" width="65" height="3" rx="1.5" fill="#444444" />
</svg>
